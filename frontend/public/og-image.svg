<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1916"/>
      <stop offset="100%" style="stop-color:#252320"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2825"/>
      <stop offset="100%" style="stop-color:#222120"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A853"/>
      <stop offset="100%" style="stop-color:#e8c06a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Gold glow accent top-left -->
  <circle cx="80" cy="80" r="200" fill="rgba(212,168,83,0.06)" filter="url(#glow)"/>

  <!-- Left content area -->
  <!-- Badge pill -->
  <rect x="60" y="80" width="248" height="32" rx="16" fill="rgba(212,168,83,0.15)" stroke="rgba(212,168,83,0.30)" stroke-width="1"/>
  <text x="184" y="101" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#D4A853" text-anchor="middle" letter-spacing="0.5">The app for professional chefs</text>

  <!-- Main headline -->
  <text x="60" y="175" font-family="Arial,sans-serif" font-size="64" font-weight="900" fill="#ffffff" letter-spacing="-2">Know your</text>
  <text x="60" y="248" font-family="Arial,sans-serif" font-size="64" font-weight="900" fill="#ffffff" letter-spacing="-2">food cost.</text>
  <text x="60" y="321" font-family="Arial,sans-serif" font-size="64" font-weight="900" fill="url(#gold)" letter-spacing="-2">Price with</text>
  <text x="60" y="394" font-family="Arial,sans-serif" font-size="64" font-weight="900" fill="url(#gold)" letter-spacing="-2">confidence.</text>

  <!-- Tagline -->
  <text x="60" y="448" font-family="Arial,sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.55)">Recipe costing · Menus · Events · AI Advisor · PDF Quotes</text>

  <!-- CTA button -->
  <rect x="60" y="488" width="230" height="54" rx="14" fill="#D4A853"/>
  <text x="175" y="521" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="#1A1916" text-anchor="middle">Start 14-Day Trial</text>

  <!-- URL label -->
  <text x="60" y="580" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.30)">app4chef.com</text>

  <!-- Right side: mock dashboard card -->
  <rect x="680" y="60" width="460" height="510" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Card header -->
  <rect x="680" y="60" width="460" height="56" rx="20" fill="rgba(255,255,255,0.06)"/>
  <rect x="680" y="96" width="460" height="20" fill="rgba(255,255,255,0.06)"/>
  <!-- Chef hat icon circle -->
  <circle cx="718" cy="88" r="16" fill="#D4A853"/>
  <text x="718" y="95" font-family="Arial,sans-serif" font-size="16" text-anchor="middle" fill="#1A1916">🍳</text>
  <text x="746" y="84" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#ffffff">app4chef</text>
  <text x="746" y="100" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.40)">Kitchen Dashboard</text>

  <!-- Stat cards row -->
  <!-- Card 1 -->
  <rect x="700" y="134" width="98" height="72" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="716" y="157" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">FOOD COST</text>
  <text x="716" y="180" font-family="Arial,sans-serif" font-size="22" font-weight="800" fill="#D4A853">28.4%</text>
  <text x="716" y="196" font-family="Arial,sans-serif" font-size="9" fill="rgba(22,163,74,1)">▲ Good range</text>

  <!-- Card 2 -->
  <rect x="808" y="134" width="98" height="72" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="824" y="157" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">EVENTS</text>
  <text x="824" y="180" font-family="Arial,sans-serif" font-size="22" font-weight="800" fill="#ffffff">24</text>
  <text x="824" y="196" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">this month</text>

  <!-- Card 3 -->
  <rect x="916" y="134" width="98" height="72" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="932" y="157" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">REVENUE</text>
  <text x="932" y="180" font-family="Arial,sans-serif" font-size="22" font-weight="800" fill="#ffffff">€18.2k</text>
  <text x="932" y="196" font-family="Arial,sans-serif" font-size="9" fill="rgba(22,163,74,1)">▲ +12%</text>

  <!-- Chart area label -->
  <text x="700" y="234" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.50)">Monthly Revenue</text>

  <!-- Bar chart -->
  <rect x="700" y="295" width="34" height="60" rx="5" fill="rgba(212,168,83,0.25)"/>
  <rect x="742" y="275" width="34" height="80" rx="5" fill="rgba(212,168,83,0.30)"/>
  <rect x="784" y="255" width="34" height="100" rx="5" fill="rgba(212,168,83,0.35)"/>
  <rect x="826" y="265" width="34" height="90" rx="5" fill="rgba(212,168,83,0.40)"/>
  <rect x="868" y="240" width="34" height="115" rx="5" fill="rgba(212,168,83,0.50)"/>
  <rect x="910" y="220" width="34" height="135" rx="5" fill="#D4A853"/>

  <!-- Month labels -->
  <text x="717" y="370" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.30)" text-anchor="middle">Dec</text>
  <text x="759" y="370" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.30)" text-anchor="middle">Jan</text>
  <text x="801" y="370" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.30)" text-anchor="middle">Feb</text>
  <text x="843" y="370" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.30)" text-anchor="middle">Mar</text>
  <text x="885" y="370" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.30)" text-anchor="middle">Apr</text>
  <text x="927" y="370" font-family="Arial,sans-serif" font-size="9" fill="#D4A853" text-anchor="middle">May</text>

  <!-- Divider -->
  <line x1="700" y1="390" x2="1120" y2="390" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Recent events list -->
  <text x="700" y="412" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.50)">Recent Events</text>

  <!-- Event 1 -->
  <rect x="700" y="424" width="420" height="40" rx="8" fill="rgba(255,255,255,0.03)"/>
  <circle cx="718" cy="444" r="12" fill="rgba(212,168,83,0.20)"/>
  <text x="718" y="449" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#D4A853">🍽</text>
  <text x="738" y="440" font-family="Arial,sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.85)">Wedding Dinner — 120 guests</text>
  <text x="738" y="455" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)">May 31  ·  €4,280</text>
  <rect x="1030" y="432" width="70" height="22" rx="6" fill="rgba(22,163,74,0.20)"/>
  <text x="1065" y="447" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#16A34A" text-anchor="middle">Approved</text>

  <!-- Event 2 -->
  <rect x="700" y="472" width="420" height="40" rx="8" fill="rgba(255,255,255,0.03)"/>
  <circle cx="718" cy="492" r="12" fill="rgba(212,168,83,0.20)"/>
  <text x="718" y="497" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#D4A853">🍽</text>
  <text x="738" y="488" font-family="Arial,sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.85)">Corporate Gala — 85 guests</text>
  <text x="738" y="503" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.35)">Jun 08  ·  €2,930</text>
  <rect x="1020" y="480" width="80" height="22" rx="6" fill="rgba(245,158,11,0.20)"/>
  <text x="1060" y="495" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#F59E0B" text-anchor="middle">Sent Offer</text>

  <!-- Bottom gold line accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#gold)" opacity="0.8"/>
</svg>
